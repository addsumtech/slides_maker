name: Sync skill-dist branch

# Regenerates the lightweight `skill-dist` branch (skill files only) from `main`
# whenever the skill changes, so `npx skills add addsumtech/slides_maker#skill-dist`
# always installs a ~1 MB, up-to-date copy without the gallery/site/history.

on:
  push:
    branches: [main]
    paths:
      - SKILL.md
      - agents/**
      - references/**
      - scripts/**
      - requirements.txt
      - LICENSE
      - .github/skill-dist-README.md
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: skill-dist
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble skill-only tree and force-push to skill-dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          mkdir -p "$work/skills/slide-maker"
          # Export ONLY the tracked skill files at HEAD into skills/slide-maker/
          # (no gallery, site, or history). The skills/<name>/ layout is required so
          # `npx skills` copies the WHOLE skill dir, not just SKILL.md (a root-level
          # SKILL.md is treated as a single-file skill and drops scripts/references).
          git archive --format=tar HEAD \
            SKILL.md agents references scripts requirements.txt LICENSE \
            | tar -x -C "$work/skills/slide-maker"
          cp .github/skill-dist-README.md "$work/README.md"

          cd "$work"
          git init -q -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "skill-dist: sync from ${GITHUB_SHA:0:7}"
          git push -f \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            HEAD:skill-dist
