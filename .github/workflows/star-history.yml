name: Star history

# Keep the README star-history chart current without any third-party image service.
# Regenerates docs/assets/star_history{,_dark}.png from the live GitHub star data and
# commits them back when they change.

on:
  schedule:
    - cron: "17 6 * * *"   # daily, 06:17 UTC
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: star-history
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install --quiet matplotlib

      - name: Regenerate star-history chart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/gen_star_history.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/star_history.png docs/assets/star_history_dark.png
          if git diff --staged --quiet; then
            echo "No change in star chart."
          else
            git commit -m "chore: refresh star history chart"
            git push
          fi
