<style>
:root {
  --ink:#1f2430; --paper:#fbfaf7; --mute:#8a8f9a; --accent:#c2410c; --accent-deep:#9a3410;
  --line:#e3e0d8; --card:#ffffff; --tint:#faece3;
}
* { box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { margin:0; background:var(--paper); color:var(--ink);
  font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", sans-serif;
  -webkit-font-smoothing:antialiased; }
body::before { content:""; position:fixed; inset:0 0 auto 0; height:4px;
  background:linear-gradient(90deg, var(--accent), #d97b2f 55%, var(--accent)); z-index:50; }

.wrap { max-width:1180px; margin:0 auto; padding:0 26px; }

/* ---------- hero ---------- */
.hero { position:relative; padding:74px 0 44px; overflow:hidden; }
.hero .bgGrid { position:absolute; inset:0; pointer-events:none; opacity:.5;
  background-image:linear-gradient(var(--line) 1px, transparent 1px),
                   linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size:44px 44px;
  -webkit-mask-image:radial-gradient(ellipse 90% 80% at 30% 0%, #000 0%, transparent 68%);
          mask-image:radial-gradient(ellipse 90% 80% at 30% 0%, #000 0%, transparent 68%); }
.brand { display:flex; align-items:center; gap:12px; margin-bottom:30px; position:relative; }
.brand img { width:34px; height:34px; border-radius:7px; box-shadow:0 2px 8px rgba(154,52,16,.28); }
.brand .name { font-weight:800; font-size:17px; letter-spacing:.01em; }
.brand .by { color:var(--mute); font-size:12.5px; margin-left:2px; }
.brand .by a { color:var(--mute); }
.brand .gh { margin-left:auto; }
h1 { position:relative; font-size:clamp(30px, 4.6vw, 46px); line-height:1.14; margin:0 0 18px; max-width:820px;
  font-weight:800; letter-spacing:-0.015em; }
h1 .hl { color:var(--accent); }
.lede { position:relative; color:#4b5260; font-size:16.5px; line-height:1.65; max-width:660px; margin:0 0 26px; }
.cta { position:relative; display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
.btn { display:inline-flex; align-items:center; gap:8px; text-decoration:none; font-weight:700; font-size:14.5px;
  padding:11px 20px; border-radius:10px; transition:transform .15s ease, box-shadow .15s ease; }
.btn:active { transform:translateY(1px); }
.btn.primary { background:var(--ink); color:#fff; box-shadow:0 6px 18px rgba(31,36,48,.22); }
.btn.primary:hover { background:var(--accent); box-shadow:0 8px 22px rgba(194,65,12,.32); }
.btn.ghost { border:1.5px solid var(--line); color:var(--ink); background:var(--card); }
.btn.ghost:hover { border-color:var(--accent); color:var(--accent); }
.ctaNote { position:relative; color:var(--mute); font-size:12.5px; margin:12px 2px 0; }
.stats { position:relative; display:flex; gap:0; margin-top:38px; border:1px solid var(--line); border-radius:14px;
  background:var(--card); overflow:hidden; max-width:760px; }
.stat { flex:1; padding:15px 10px 13px; text-align:center; }
.stat + .stat { border-left:1px solid var(--line); }
.stat .n { font-size:21px; font-weight:800; letter-spacing:-0.01em; }
.stat .n em { font-style:normal; color:var(--accent); }
.stat .l { color:var(--mute); font-size:11.5px; margin-top:2px; letter-spacing:.02em; }

/* ---------- gallery ---------- */
.bar { display:flex; align-items:center; gap:16px; margin:34px 0 20px; flex-wrap:wrap; }
.bar h2 { font-size:21px; margin:0; letter-spacing:-0.01em; }
.toggle { display:inline-flex; border:1px solid var(--line); border-radius:10px; overflow:hidden; background:var(--card); }
.toggle button { border:0; background:transparent; color:var(--mute); padding:8px 20px; font-size:13.5px; cursor:pointer; font-weight:700; }
.toggle button.on { background:var(--ink); color:#fff; }
.bar .hint { color:var(--mute); font-size:13px; margin-left:auto; }
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(330px, 1fr)); gap:24px; padding-bottom:8px; }
.card { background:var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden;
  box-shadow:0 3px 14px rgba(31,36,48,.05); display:flex; flex-direction:column;
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
.card:hover { transform:translateY(-4px); box-shadow:0 14px 34px rgba(31,36,48,.13); border-color:#d8d2c4; }
.cover { position:relative; display:block; line-height:0; overflow:hidden; }
.cover img { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; transition:opacity .25s ease; }
.cover .badge { position:absolute; right:10px; bottom:10px; background:rgba(31,36,48,.82); color:#fff;
  font-size:11px; font-weight:700; padding:4px 9px; border-radius:99px; letter-spacing:.03em; backdrop-filter:blur(4px); }
.cover .dots { position:absolute; left:12px; bottom:13px; display:flex; gap:5px; opacity:0; transition:opacity .2s; }
.card:hover .dots { opacity:1; }
.cover .dots i { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.45); }
.cover .dots i.on { background:#fff; }
.meta { padding:15px 17px 16px; display:flex; flex-direction:column; gap:6px; flex:1; }
.meta .name { font-weight:800; font-size:16px; letter-spacing:-0.01em; }
.meta .use { color:var(--mute); font-size:13px; line-height:1.55; flex:1; }
.meta .row { display:flex; gap:10px; margin-top:10px; }
.meta .row a { text-decoration:none; font-weight:700; font-size:13.5px; padding:8px 14px; border-radius:9px; }
.meta .row a.flip { background:var(--tint); color:var(--accent-deep); flex:1; text-align:center; }
.meta .row a.flip:hover { background:var(--accent); color:#fff; }
.meta .row a.dl { border:1.5px solid var(--line); color:var(--ink); }
.meta .row a.dl:hover { border-color:var(--accent); color:var(--accent); }

/* ---------- intro video ---------- */
.vid { margin-top:34px; }
.vidcard { border:1px solid var(--line); background:var(--card); border-radius:16px; padding:24px 28px; }
.vidhead { display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; margin-bottom:14px; }
.vidhead h2 { margin:0; font-size:20px; }
.vidhead p { margin:0; color:#4b5260; font-size:14px; }
.vidcard video { width:100%; display:block; border-radius:12px; border:1px solid var(--line); background:#000;
  box-shadow:0 12px 36px rgba(31,36,48,.10); aspect-ratio:16/9; }

/* ---------- how ---------- */
.how { margin:52px 0 0; border:1px solid var(--line); background:var(--card); border-radius:16px; padding:26px 28px; }
.how h3 { margin:0 0 8px; font-size:17px; }
.how p { margin:0 0 14px; color:#4b5260; font-size:14px; line-height:1.65; }
.how .steps { margin:0 0 16px; padding-left:0; list-style:none; counter-reset:hs; display:flex; gap:22px; flex-wrap:wrap; }
.how .steps li { counter-increment:hs; position:relative; padding-left:34px; color:#4b5260; font-size:14px;
  line-height:1.55; flex:1; min-width:200px; }
.how .steps li::before { content:counter(hs); position:absolute; left:0; top:1px; width:24px; height:24px;
  border-radius:50%; background:var(--accent); color:#fff; font-weight:800; font-size:12.5px;
  display:flex; align-items:center; justify-content:center; }
.how .steps a { color:var(--accent); font-weight:600; text-decoration:none; }
.how .steps a:hover { text-decoration:underline; }
.codewrap { display:flex; gap:10px; align-items:stretch; }
.how code { display:block; flex:1; background:var(--ink); color:#f2efe7; border-radius:10px; padding:14px 16px;
  font-family:ui-monospace, "SF Mono", Menlo, monospace; font-size:13px; line-height:1.6; overflow-x:auto; white-space:pre; }
.codewrap button { border:1.5px solid var(--line); background:#fff; color:var(--ink); border-radius:10px;
  padding:0 18px; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
.codewrap button:hover { border-color:var(--accent); color:var(--accent); }
.how .foot { margin:12px 0 0; color:var(--mute); font-size:12.5px; }

footer { margin-top:56px; border-top:1px solid var(--line); }
footer .inner { display:flex; align-items:center; gap:18px; flex-wrap:wrap; padding:24px 0 40px; color:var(--mute); font-size:13px; }
footer img { width:22px; height:22px; border-radius:5px; }
footer a { color:var(--accent); text-decoration:none; font-weight:600; }
footer .sp { flex:1; }

@media (max-width:640px) {
  .hero { padding-top:50px; }
  .stats { flex-wrap:wrap; }
  .stat { flex-basis:50%; border-top:1px solid var(--line); }
  .stat:nth-child(1), .stat:nth-child(2) { border-top:0; }
  .stat:nth-child(3) { border-left:0; }
  .bar .hint { display:none; }
}
</style>

<script>
const REPO = 'https://github.com/addsumtech/slides_maker';
const STR = {
  en: {
    byline: 'by <a href="https://addsum.top/en/">Addsum</a>',
    headline: 'Real decks. <span class="hl">Really editable.</span><br>Generated end-to-end by AI agents.',
    lede: 'A skill for Codex and Claude Code that turns papers, code, docs, or just a topic into a natively editable PPTX: real text boxes, native charts, editable math, speaker notes, click builds. Every deck below came out of it. Hover a card to flip through.',
    ctaFlip: 'Browse the decks ↓', ctaDl: '⬇ Grab the sample deck',
    ctaNote: 'The sample is the 15-page paper-talk deck. Open it in PowerPoint and click anything: the chart, the math, the speaker notes.',
    st1: 'complete decks', st2: 'languages × styles', st3: 'native editable PPTX', st4: 'free & open source',
    vTitle: 'See it work · 2\u00bd min',
    vLede: 'How one prompt becomes an editable deck: the interview, the build, and the self-review. English narration with captions.',
    galleryTitle: 'The gallery', hoverHint: 'Hover a cover to preview pages',
    pages: 'pages', flip: 'Flip online', dl: '.pptx',
    howTitle: 'Use any of these as your template',
    hs1: '<a href="https://github.com/addsumtech/slides_maker#quick-start">Install slide-maker</a> — clone the repo and run one install command. Every deck above ships inside it as template.pptx plus a style profile.',
    hs2: 'Pick a deck you like. Its exact command is on the flip-through page, one Copy click away.',
    hs3: 'Paste it into Claude Code or Codex with your own material, and answer the short interview.',
    howCode: 'Use slide-maker. Follow the style of templates/decks/en/nvidia-overview/template.pptx\nand build a product intro from my product.md.',
    howCopy: 'Copy',
    howCopied: 'Copied ✓',
    howFoot: 'The path is relative to your cloned repo. slide-maker parses the deck\'s layout and visual system, then rebuilds them around your content.',
    footText: 'Built with slide-maker in Codex / Claude Code.',
    footReadme: 'Quick start',
    title: 'slide-maker — flip through real generated decks',
  },
  zh: {
    byline: '<a href="https://addsum.top/">增和科技 Addsum</a> 出品',
    headline: '真实的 deck，<span class="hl">真的能编辑</span>。<br>由 AI agent 团队端到端生成。',
    lede: '一个给 Codex 和 Claude Code 用的 skill：把论文、代码、文档，甚至只是一个主题，变成原生可编辑的 PPTX。真文本框、原生图表、可编辑公式、逐页讲稿、点击渐显。下面每一套都是它生成的，悬停封面即可翻页预览。',
    ctaFlip: '浏览全部 deck ↓', ctaDl: '⬇ 下载样例 .pptx',
    ctaNote: '样例是 15 页的论文精读 deck。在 PowerPoint 里打开随便点：图表、公式、讲稿备注，都是活的。',
    st1: '套完整 deck', st2: '两种语言 × 八种风格', st3: '原生可编辑 PPTX', st4: '免费开源',
    vTitle: '2 分半，看它怎么干活',
    vLede: '一条指令如何变成可编辑的 deck：访谈、构建、自检全流程。英文配音，带字幕。',
    galleryTitle: '模板画廊', hoverHint: '悬停封面可预览内页',
    pages: '页', flip: '在线翻页', dl: '.pptx',
    howTitle: '把任何一套当作你的模板',
    hs1: '<a href="https://github.com/addsumtech/slides_maker/blob/main/README_CN.md#快速开始">装好 slide-maker</a>：clone 仓库跑一条安装命令。上面每套 deck 都以 template.pptx 加风格档案的形式装在里面。',
    hs2: '挑一套喜欢的。它的专属命令就在翻页页面上，点一下复制。',
    hs3: '带上你自己的材料贴进 Claude Code 或 Codex，答完简短访谈即可。',
    howCode: '用 slide-maker，参考 templates/decks/zh/nvidia-overview/template.pptx 的风格，\n按我的 product.md 做一份产品介绍。',
    howCopy: '复制',
    howCopied: '已复制 ✓',
    howFoot: '路径相对于你 clone 下来的仓库。slide-maker 会解析这套 deck 的版式和视觉系统，围绕你的内容重建。',
    footText: '由 slide-maker 在 Codex / Claude Code 里生成。',
    footReadme: '快速开始',
    title: 'slide-maker — 在线翻阅真实生成的 PPT',
  },
};

function pad(n) { return String(n).padStart(2, '0'); }

function card(d, t) {
  const base = `templates/decks/${d.id}/render/`;
  const view = `viewer.html?deck=${encodeURIComponent(d.id)}`;
  const dl = `templates/decks/${d.id}/template.pptx`;
  return `<div class="card" data-id="${d.id}" data-pages="${d.pages}">
    <a class="cover" href="${view}">
      <img loading="lazy" src="${base}slide01.png" alt="${d.title} preview">
      <span class="dots"><i class="on"></i><i></i><i></i></span>
      <span class="badge">${d.pages} ${t.pages}</span>
    </a>
    <div class="meta">
      <div class="name">${d.title}</div>
      <div class="use">${d.use}</div>
      <div class="row"><a class="flip" href="${view}">${t.flip} →</a><a class="dl" href="${dl}" download>⬇ ${t.dl}</a></div>
    </div>
  </div>`;
}

function armHoverPreview() {
  document.querySelectorAll('.card').forEach(c => {
    const img = c.querySelector('.cover img');
    const dots = c.querySelectorAll('.dots i');
    const id = c.dataset.id, pages = +c.dataset.pages;
    const frames = [1, 2, 3].filter(n => n <= pages);
    let idx = 0, timer = null;
    c.addEventListener('mouseenter', () => {
      frames.forEach(n => { const p = new Image(); p.src = `templates/decks/${id}/render/slide${pad(n)}.png`; });
      timer = setInterval(() => {
        idx = (idx + 1) % frames.length;
        img.src = `templates/decks/${id}/render/slide${pad(frames[idx])}.png`;
        dots.forEach((dd, k) => dd.classList.toggle('on', k === idx));
      }, 1100);
    });
    c.addEventListener('mouseleave', () => {
      clearInterval(timer); idx = 0;
      img.src = `templates/decks/${id}/render/slide01.png`;
      dots.forEach((dd, k) => dd.classList.toggle('on', k === 0));
    });
  });
}

function setLang(lang) {
  const t = STR[lang];
  if (history.replaceState) history.replaceState(null, '', lang === 'zh' ? '#zh' : '#en');
  document.getElementById('btn-en').classList.toggle('on', lang === 'en');
  document.getElementById('btn-zh').classList.toggle('on', lang === 'zh');
  for (const k of ['byline','headline','lede','vTitle','vLede','st1','st2','st3','st4','galleryTitle','hoverHint','howTitle','hs1','hs2','hs3','howFoot','footText','footReadme','ctaNote']) {
    const el = document.getElementById(k);
    if (el) el.innerHTML = t[k];
  }
  document.getElementById('ctaFlip').textContent = t.ctaFlip;
  document.getElementById('ctaDl').textContent = t.ctaDl;
  document.getElementById('ctaDl').href = `templates/decks/${lang}/transformer-talk/template.pptx`;
  document.getElementById('howCode').textContent = t.howCode;
  const hc = document.getElementById('howCopy');
  hc.textContent = t.howCopy;
  hc.onclick = () => navigator.clipboard.writeText(t.howCode).then(() => {
    hc.textContent = t.howCopied;
    setTimeout(() => { hc.textContent = t.howCopy; }, 1600);
  });
  document.title = t.title;
  document.documentElement.lang = (lang === 'zh') ? 'zh-CN' : 'en';
  document.getElementById('grid').innerHTML =
    (window.DECKS || []).filter(d => d.lang === lang).map(d => card(d, t)).join('');
  armHoverPreview();
}
setLang(location.hash === '#zh' ? 'zh' : 'en');
</script>
